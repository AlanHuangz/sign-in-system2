<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>補習班影片授權與教務系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-top: 0; }
        
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; cursor: pointer; background: none; border: none; font-size: 16px; font-weight: bold; color: #777; transition: 0.3s; }
        .tab-btn.active { color: #4CAF50; border-bottom: 3px solid #4CAF50; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        select, input[type="text"], input[type="email"], input[type="date"], input[list] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box;}
        .checkbox-group { border: 1px solid #ccc; padding: 15px; border-radius: 5px; max-height: 200px; overflow-y: auto; background-color: #fafafa; }
        .checkbox-item { margin-bottom: 10px; display: flex; align-items: center; }
        .checkbox-item input { margin-right: 10px; transform: scale(1.2); }
        button { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #45a049; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        
        .result-box { margin-top: 20px; }
        textarea { width: 100%; height: 80px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; resize: vertical; box-sizing: border-box;}
        .loading { text-align: center; color: #666; font-style: italic; }
        
        .management-section { border: 1px solid #eee; padding: 20px; border-radius: 8px; margin-bottom: 20px; background-color: #fafafa; }
        .management-section h3 { margin-top: 0; color: #2196F3; }
        .info-text { font-size: 14px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>影片授權與教務系統</h2>
    
    <div id="loadingStatus" class="loading">正在與資料庫同步中，請稍候...</div>

    <div id="mainApp" style="display:none;">
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('generateTab', this)">📝 產生鎖檔</button>
            <button class="tab-btn" onclick="switchTab('historyTab', this)">📂 鎖檔名單</button>
            <button class="tab-btn" onclick="switchTab('manageTab', this)">👨‍🎓 系統設定</button>
        </div>

        <div id="generateTab" class="tab-content active">
            <div class="info-text" style="margin-bottom: 15px; text-align: center; color: #d32f2f;">
                💡 系統會自動帶入「該日已有紀錄」的學生與「固定鎖檔帳號」
            </div>
            <div class="form-group">
                <label>日期</label>
                <input type="date" id="dateSelect">
            </div>
            <div class="form-group">
                <label>年級</label>
                <select id="gradeSelect"><option value="">請選擇年級</option></select>
            </div>
            <div class="form-group">
                <label>班級</label>
                <select id="classSelect" disabled><option value="">請先選擇年級</option></select>
            </div>
            <div class="form-group">
                <label>需鎖檔學生 (可複選)</label>
                <div id="studentCheckboxes" class="checkbox-group">
                    <div style="color:#999; text-align:center;">請先選擇班級</div>
                </div>
            </div>
            <button onclick="processAndRecord()" id="submitBtn">產生授權信箱 並 儲存鎖檔名單</button>
            <div class="result-box">
                <textarea id="emailOutput" readonly placeholder="產生的信箱會顯示在這裡..."></textarea>
                <button onclick="copyToClipboard()" style="background-color: #008CBA; margin-top: 5px;">一鍵複製信箱字串</button>
            </div>
        </div>

        <div id="historyTab" class="tab-content">
            <table>
                <thead>
                    <tr><th>日期</th><th>班級</th><th>鎖檔名單</th></tr>
                </thead>
                <tbody id="historyTableBody"></tbody>
            </table>
        </div>

        <div id="manageTab" class="tab-content">
            <div class="management-section">
                <h3>1. 新增學生至總表 (工作表一)</h3>
                <div class="form-group"><label>學生姓名</label><input type="text" id="newStudentName" placeholder="例如：王小明"></div>
                <div class="form-group"><label>Gmail 信箱</label><input type="email" id="newStudentEmail" placeholder="例如：example@gmail.com"></div>
                <button onclick="addNewStudent()" id="btnAddStudent" style="background-color: #2196F3;">確認新增學生</button>
            </div>

            <div class="management-section">
                <h3>2. 將學生編入班級 (工作表二)</h3>
                <div class="form-group"><label>選擇學生</label><input list="studentDatalist" id="assignStudentInput" placeholder="請輸入關鍵字或選擇學生..."><datalist id="studentDatalist"></datalist></div>
                <div class="form-group"><label>選擇或輸入年級</label><input list="gradeDatalist" id="assignGradeInput" placeholder="例如：國一、會考..."><datalist id="gradeDatalist"></datalist></div>
                <div class="form-group"><label>選擇或輸入班級</label><input list="classDatalist" id="assignClassInput" placeholder="請選擇或輸入班級..."><datalist id="classDatalist"></datalist></div>
                <button onclick="assignStudentToClass()" id="btnAssignClass" style="background-color: #2196F3;">確認編入班級</button>
            </div>

            <div class="management-section">
                <h3>3. 修改現有學生的 Gmail (工作表一)</h3>
                <div class="form-group"><label>選擇學生</label><input list="studentDatalist" id="updateStudentInput" placeholder="請輸入關鍵字或選擇學生..."></div>
                <div class="form-group"><label>輸入新的 Gmail</label><input type="email" id="updateStudentEmail" placeholder="例如：new_email@gmail.com"></div>
                <button onclick="updateStudentEmail()" id="btnUpdateEmail" style="background-color: #FF9800;">確認新增綁定信箱</button>
            </div>

            <div class="management-section" style="background-color: #eef7e6; border-color: #c5e1a5;">
                <h3 style="color: #4CAF50;">4. 新增固定鎖檔帳號 (工作表四)</h3>
                <div class="info-text">將行政人員或科任老師加入，產出信箱時會自動附加在名單後方。</div>
                <div class="form-group" style="margin-top: 10px;"><label>適用範圍</label><input list="scopeDatalist" id="fixedScope" placeholder="請選擇範圍..."><datalist id="scopeDatalist"></datalist></div>
                <div class="form-group"><label>姓名 / 身份</label><input type="text" id="fixedName" placeholder="例如：數學張老師、主任"></div>
                <div class="form-group"><label>Gmail 信箱</label><input type="email" id="fixedEmail" placeholder="例如：teacher@gmail.com"></div>
                <button onclick="addFixedEmail()" id="btnFixedEmail" style="background-color: #4CAF50;">確認新增固定名單</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ⚠️ 請填入你的 GAS Web App URL
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyX4b2skbjzoc5URO2mljwleVuVtVH_gO6qivm-9LeySDEJoIBi15u6f38ruzl-GEJ8/exec'; 
    
    let dbData = {};

    window.onload = function() {
        document.getElementById('dateSelect').valueAsDate = new Date();
        loadData();
    };

    function loadData() {
        document.getElementById('loadingStatus').style.display = 'block';
        document.getElementById('mainApp').style.display = 'none';

        fetch(GAS_URL)
            .then(response => response.json())
            .then(data => {
                dbData = data;
                initGradeSelect();
                initDatalists(); 
                renderHistoryTable();
                
                if(document.getElementById('classSelect').value !== "") {
                    restoreCheckboxState();
                }

                document.getElementById('loadingStatus').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
            })
            .catch(error => {
                document.getElementById('loadingStatus').innerText = '載入失敗，請檢查網路。';
            });
    }

    function switchTab(tabId, btnElement) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btnElement.classList.add('active');
    }

    function initGradeSelect() {
        const gradeSelect = document.getElementById('gradeSelect');
        const currentVal = gradeSelect.value; 
        gradeSelect.innerHTML = '<option value="">請選擇年級</option>';
        Object.keys(dbData.classData).forEach(grade => {
            let option = document.createElement('option');
            option.value = grade; option.textContent = grade;
            gradeSelect.appendChild(option);
        });
        if(currentVal && dbData.classData[currentVal]) gradeSelect.value = currentVal;
    }

    function initDatalists() {
        const studentDatalist = document.getElementById('studentDatalist');
        studentDatalist.innerHTML = '';
        if(dbData.allStudents) {
            dbData.allStudents.forEach(name => {
                let option = document.createElement('option');
                option.value = name; studentDatalist.appendChild(option);
            });
        }

        const gradeDatalist = document.getElementById('gradeDatalist');
        const classDatalist = document.getElementById('classDatalist');
        const scopeDatalist = document.getElementById('scopeDatalist');
        
        let existingGrades = new Set(['國一', '國二', '國三', '會考']); 
        let existingClasses = new Set();
        scopeDatalist.innerHTML = '<option value="全校通用">全校通用 (任何班級鎖檔皆會加入)</option>';

        if(dbData.classData) {
            Object.keys(dbData.classData).forEach(grade => {
                existingGrades.add(grade);
                Object.keys(dbData.classData[grade]).forEach(cls => {
                    existingClasses.add(cls);
                    let scopeOption = document.createElement('option');
                    scopeOption.value = cls; scopeDatalist.appendChild(scopeOption);
                });
            });
        }
        gradeDatalist.innerHTML = ''; existingGrades.forEach(g => { let option = document.createElement('option'); option.value = g; gradeDatalist.appendChild(option); });
        classDatalist.innerHTML = ''; existingClasses.forEach(c => { let option = document.createElement('option'); option.value = c; classDatalist.appendChild(option); });
    }

    function restoreCheckboxState() {
        const dateVal = document.getElementById('dateSelect').value;
        const gradeVal = document.getElementById('gradeSelect').value;
        const classVal = document.getElementById('classSelect').value;
        
        const checkboxes = document.querySelectorAll('#studentCheckboxes input[type="checkbox"]');
        checkboxes.forEach(cb => cb.checked = false);

        if (!dateVal || !gradeVal || !classVal || !dbData.historyData) return;

        const record = dbData.historyData.find(r => r.date === dateVal && r.grade === gradeVal && r.className === classVal);
        
        if (record && record.students) {
            const savedStudents = record.students.split(',').map(s => s.trim());
            savedStudents.forEach(student => {
                const cb = document.getElementById('student_' + student);
                if (cb) cb.checked = true;
            });
        }
        document.getElementById('emailOutput').value = ''; 
    }

    document.getElementById('dateSelect').addEventListener('change', restoreCheckboxState);

    document.getElementById('gradeSelect').addEventListener('change', function() {
        const classSelect = document.getElementById('classSelect');
        const studentCheckboxes = document.getElementById('studentCheckboxes');
        const selectedGrade = this.value;

        classSelect.innerHTML = '<option value="">請選擇班級</option>';
        studentCheckboxes.innerHTML = '<div style="color:#999; text-align:center;">請先選擇班級</div>';

        if (selectedGrade) {
            classSelect.disabled = false;
            Object.keys(dbData.classData[selectedGrade]).forEach(cls => {
                let option = document.createElement('option');
                option.value = cls; option.textContent = cls;
                classSelect.appendChild(option);
            });
        } else {
            classSelect.disabled = true;
        }
    });

    document.getElementById('classSelect').addEventListener('change', function() {
        const studentCheckboxes = document.getElementById('studentCheckboxes');
        const selectedGrade = document.getElementById('gradeSelect').value;
        const selectedClass = this.value;

        studentCheckboxes.innerHTML = '';
        if (selectedClass) {
            dbData.classData[selectedGrade][selectedClass].forEach(student => {
                let div = document.createElement('div');
                div.className = 'checkbox-item';
                div.innerHTML = `<input type="checkbox" id="student_${student}" value="${student}"> 
                                 <label for="student_${student}" style="margin:0; font-weight:normal;">${student}</label>`;
                studentCheckboxes.appendChild(div);
            });
            restoreCheckboxState();
        }
    });

    function processAndRecord() {
        const dateVal = document.getElementById('dateSelect').value;
        const gradeVal = document.getElementById('gradeSelect').value;
        const classVal = document.getElementById('classSelect').value;
        const checkboxes = document.querySelectorAll('#studentCheckboxes input[type="checkbox"]:checked');
        const outputArea = document.getElementById('emailOutput');
        const submitBtn = document.getElementById('submitBtn');
        
        if (!dateVal || !gradeVal || !classVal) { alert('請確保日期、年級、班級都有選擇！'); return; }

        let absentStudents = [];
        let finalEmailsSet = new Set();

        checkboxes.forEach(cb => {
            let studentName = cb.value;
            absentStudents.push(studentName);
            let emailString = dbData.studentEmails[studentName];
            if (emailString) {
                emailString.split(',').forEach(e => finalEmailsSet.add(e.trim()));
            }
        });

        if (dbData.fixedEmails && dbData.fixedEmails.global) {
            dbData.fixedEmails.global.forEach(e => finalEmailsSet.add(e.trim()));
        }
        if (dbData.fixedEmails && dbData.fixedEmails.byClass && dbData.fixedEmails.byClass[classVal]) {
            dbData.fixedEmails.byClass[classVal].forEach(e => finalEmailsSet.add(e.trim()));
        }

        outputArea.value = Array.from(finalEmailsSet).join(', ');

        const payload = {
            action: 'addRecord',
            date: dateVal, grade: gradeVal, className: classVal, students: absentStudents.join(', ')
        };

        submitBtn.disabled = true; submitBtn.innerText = "名單更新中...";

        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(response => response.json())
        .then(data => {
            submitBtn.innerText = "✅ 鎖檔名單已更新！";
            loadData(); 
            setTimeout(() => { submitBtn.disabled = false; submitBtn.innerText = "產生授權信箱 並 儲存鎖檔名單"; }, 2500);
        });
    }

    function renderHistoryTable() {
        const tbody = document.getElementById('historyTableBody');
        if(!dbData.historyData || dbData.historyData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#999;">目前尚無紀錄</td></tr>'; return;
        }
        let html = '';
        dbData.historyData.forEach(record => {
            html += `<tr><td>${record.date}</td><td>${record.grade} - ${record.className}</td><td>${record.students}</td></tr>`;
        });
        tbody.innerHTML = html;
    }

    function addNewStudent() {
        const name = document.getElementById('newStudentName').value.trim(); const email = document.getElementById('newStudentEmail').value.trim(); const btn = document.getElementById('btnAddStudent');
        if(!name || !email) { alert("請填寫！"); return; }
        const payload = { action: 'addStudent', name: name, email: email }; btn.disabled = true; btn.innerText = "新增中...";
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r=>r.json()).then(data => { alert("✅ 已新增！"); document.getElementById('newStudentName').value=''; document.getElementById('newStudentEmail').value=''; btn.disabled=false; btn.innerText="確認新增學生"; loadData(); });
    }
    function assignStudentToClass() {
        const name = document.getElementById('assignStudentInput').value.trim(); const grade = document.getElementById('assignGradeInput').value.trim(); const className = document.getElementById('assignClassInput').value.trim(); const btn = document.getElementById('btnAssignClass');
        if(!name || !grade || !className) { alert("請填寫！"); return; }
        const payload = { action: 'assignClass', name: name, grade: grade, className: className }; btn.disabled = true; btn.innerText = "編班中...";
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r=>r.json()).then(data => { alert("✅ 已編班！"); document.getElementById('assignStudentInput').value=''; document.getElementById('assignGradeInput').value=''; document.getElementById('assignClassInput').value=''; btn.disabled=false; btn.innerText="確認編入班級"; loadData(); });
    }
    function updateStudentEmail() {
        const name = document.getElementById('updateStudentInput').value.trim(); const email = document.getElementById('updateStudentEmail').value.trim(); const btn = document.getElementById('btnUpdateEmail');
        if(!name || !email) { alert("請填寫！"); return; }
        const payload = { action: 'updateEmail', name: name, email: email }; btn.disabled = true; btn.innerText = "綁定中...";
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r=>r.json()).then(data => { if(data.status==='success'){alert("✅ 已綁定！"); document.getElementById('updateStudentInput').value=''; document.getElementById('updateStudentEmail').value=''; loadData();}else{alert("❌ 失敗");} btn.disabled=false; btn.innerText="確認新增綁定信箱"; });
    }
    function addFixedEmail() {
        const scope = document.getElementById('fixedScope').value.trim(); const name = document.getElementById('fixedName').value.trim(); const email = document.getElementById('fixedEmail').value.trim(); const btn = document.getElementById('btnFixedEmail');
        if(!scope || !name || !email) { alert("請填寫！"); return; }
        const payload = { action: 'addFixedEmail', scope: scope, name: name, email: email }; btn.disabled = true; btn.innerText = "新增中...";
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r=>r.json()).then(data => { alert("✅ 已加入！"); document.getElementById('fixedScope').value=''; document.getElementById('fixedName').value=''; document.getElementById('fixedEmail').value=''; btn.disabled=false; btn.innerText="確認新增固定名單"; loadData(); });
    }
    function copyToClipboard() {
        const copyText = document.getElementById("emailOutput"); if(!copyText.value) return;
        copyText.select(); copyText.setSelectionRange(0, 99999); navigator.clipboard.writeText(copyText.value).then(() => { alert("✅ 信箱已複製！"); });
    }
</script>

</body>
</html>
