<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>補習班影片授權與教務系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-top: 0; }
        
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; cursor: pointer; background: none; border: none; font-size: 16px; font-weight: bold; color: #777; transition: 0.3s; }
        .tab-btn.active { color: #4CAF50; border-bottom: 3px solid #4CAF50; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        select, input[type="text"], input[type="email"], input[type="date"], input[list] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box;}
        .checkbox-group { border: 1px solid #ccc; padding: 15px; border-radius: 5px; max-height: 200px; overflow-y: auto; background-color: #fafafa; }
        .checkbox-item { margin-bottom: 10px; display: flex; align-items: center; }
        .checkbox-item input { margin-right: 10px; transform: scale(1.2); }
        button { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #45a049; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        
        .result-box { margin-top: 20px; }
        textarea { width: 100%; height: 80px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; resize: vertical; box-sizing: border-box;}
        .loading { text-align: center; color: #666; font-style: italic; }
        
        .management-section { border: 1px solid #eee; padding: 20px; border-radius: 8px; margin-bottom: 20px; background-color: #fafafa; }
        .management-section h3 { margin-top: 0; color: #2196F3; }
    </style>
</head>
<body>

<div class="container">
    <h2>影片授權與教務系統</h2>
    
    <div id="loadingStatus" class="loading">正在與資料庫同步中，請稍候...</div>

    <div id="mainApp" style="display:none;">
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('generateTab', this)">📝 新增授權</button>
            <button class="tab-btn" onclick="switchTab('historyTab', this)">📂 缺課紀錄</button>
            <button class="tab-btn" onclick="switchTab('manageTab', this)">👨‍🎓 名單管理</button>
        </div>

        <div id="generateTab" class="tab-content active">
            <div class="form-group">
                <label>補課日期</label>
                <input type="date" id="dateSelect">
            </div>
            <div class="form-group">
                <label>年級</label>
                <select id="gradeSelect"><option value="">請選擇年級</option></select>
            </div>
            <div class="form-group">
                <label>班級</label>
                <select id="classSelect" disabled><option value="">請先選擇年級</option></select>
            </div>
            <div class="form-group">
                <label>缺課學生 (可複選)</label>
                <div id="studentCheckboxes" class="checkbox-group">
                    <div style="color:#999; text-align:center;">請先選擇班級</div>
                </div>
            </div>
            <button onclick="processAndRecord()" id="submitBtn">產生授權信箱 並 寫入缺課紀錄</button>
            <div class="result-box">
                <textarea id="emailOutput" readonly placeholder="產生的信箱會顯示在這裡..."></textarea>
                <button onclick="copyToClipboard()" style="background-color: #008CBA; margin-top: 5px;">一鍵複製</button>
            </div>
        </div>

        <div id="historyTab" class="tab-content">
            <table>
                <thead>
                    <tr><th>日期</th><th>班級</th><th>缺席名單</th></tr>
                </thead>
                <tbody id="historyTableBody"></tbody>
            </table>
        </div>

        <div id="manageTab" class="tab-content">
            <div class="management-section">
                <h3>1. 新增學生至總表 (工作表一)</h3>
                <div class="form-group">
                    <label>學生姓名</label>
                    <input type="text" id="newStudentName" placeholder="例如：王小明">
                </div>
                <div class="form-group">
                    <label>Gmail 信箱</label>
                    <input type="email" id="newStudentEmail" placeholder="例如：example@gmail.com">
                </div>
                <button onclick="addNewStudent()" id="btnAddStudent" style="background-color: #2196F3;">確認新增學生</button>
            </div>

            <div class="management-section">
                <h3>2. 將學生編入班級 (工作表二)</h3>
                <div class="form-group">
                    <label>選擇學生 (點擊輸入框可直接搜尋姓名)</label>
                    <input list="studentDatalist" id="assignStudentInput" placeholder="請輸入關鍵字或選擇學生...">
                    <datalist id="studentDatalist"></datalist>
                </div>
                <div class="form-group">
                    <label>選擇或輸入年級</label>
                    <input list="gradeDatalist" id="assignGradeInput" placeholder="例如：國一、會考...">
                    <datalist id="gradeDatalist"></datalist>
                </div>
                <div class="form-group">
                    <label>選擇或輸入班級</label>
                    <input list="classDatalist" id="assignClassInput" placeholder="請選擇或輸入班級...">
                    <datalist id="classDatalist"></datalist>
                </div>
                <button onclick="assignStudentToClass()" id="btnAssignClass" style="background-color: #2196F3;">確認編入班級</button>
            </div>
        </div>

    </div>
</div>

<script>
    // ⚠️ 請填入你的 GAS Web App URL
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyX4b2skbjzoc5URO2mljwleVuVtVH_gO6qivm-9LeySDEJoIBi15u6f38ruzl-GEJ8/exec'; 
    
    let dbData = {};

    window.onload = function() {
        document.getElementById('dateSelect').valueAsDate = new Date();
        loadData();
    };

    function loadData() {
        document.getElementById('loadingStatus').style.display = 'block';
        document.getElementById('mainApp').style.display = 'none';

        fetch(GAS_URL)
            .then(response => response.json())
            .then(data => {
                dbData = data;
                initGradeSelect();
                initDatalists(); // 改呼叫這個新函數
                renderHistoryTable();
                document.getElementById('loadingStatus').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
            })
            .catch(error => {
                document.getElementById('loadingStatus').innerText = '載入失敗，請檢查網路或 GAS 網址。';
            });
    }

    function switchTab(tabId, btnElement) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btnElement.classList.add('active');
    }

    function initGradeSelect() {
        const gradeSelect = document.getElementById('gradeSelect');
        gradeSelect.innerHTML = '<option value="">請選擇年級</option>';
        const grades = Object.keys(dbData.classData);
        grades.forEach(grade => {
            let option = document.createElement('option');
            option.value = grade; option.textContent = grade;
            gradeSelect.appendChild(option);
        });
    }

    // --- 新增：初始化所有可搜尋下拉選單 (Datalist) ---
    function initDatalists() {
        // 1. 學生搜尋選單
        const studentDatalist = document.getElementById('studentDatalist');
        studentDatalist.innerHTML = '';
        if(dbData.allStudents) {
            dbData.allStudents.forEach(name => {
                let option = document.createElement('option');
                option.value = name;
                studentDatalist.appendChild(option);
            });
        }

        // 2. 年級與班級選單
        const gradeDatalist = document.getElementById('gradeDatalist');
        const classDatalist = document.getElementById('classDatalist');
        
        let existingGrades = new Set(['國一', '國二', '國三', '會考']); // 預設選項
        let existingClasses = new Set();

        if(dbData.classData) {
            Object.keys(dbData.classData).forEach(grade => {
                existingGrades.add(grade);
                Object.keys(dbData.classData[grade]).forEach(cls => {
                    existingClasses.add(cls);
                });
            });
        }

        gradeDatalist.innerHTML = '';
        existingGrades.forEach(g => {
            let option = document.createElement('option');
            option.value = g; gradeDatalist.appendChild(option);
        });

        classDatalist.innerHTML = '';
        existingClasses.forEach(c => {
            let option = document.createElement('option');
            option.value = c; classDatalist.appendChild(option);
        });
    }

    document.getElementById('gradeSelect').addEventListener('change', function() {
        const classSelect = document.getElementById('classSelect');
        const studentCheckboxes = document.getElementById('studentCheckboxes');
        const selectedGrade = this.value;

        classSelect.innerHTML = '<option value="">請選擇班級</option>';
        studentCheckboxes.innerHTML = '<div style="color:#999; text-align:center;">請先選擇班級</div>';

        if (selectedGrade) {
            classSelect.disabled = false;
            Object.keys(dbData.classData[selectedGrade]).forEach(cls => {
                let option = document.createElement('option');
                option.value = cls; option.textContent = cls;
                classSelect.appendChild(option);
            });
        } else {
            classSelect.disabled = true;
        }
    });

    document.getElementById('classSelect').addEventListener('change', function() {
        const studentCheckboxes = document.getElementById('studentCheckboxes');
        const selectedGrade = document.getElementById('gradeSelect').value;
        const selectedClass = this.value;

        studentCheckboxes.innerHTML = '';
        if (selectedClass) {
            dbData.classData[selectedGrade][selectedClass].forEach(student => {
                let div = document.createElement('div');
                div.className = 'checkbox-item';
                div.innerHTML = `<input type="checkbox" id="student_${student}" value="${student}"> 
                                 <label for="student_${student}" style="margin:0; font-weight:normal;">${student}</label>`;
                studentCheckboxes.appendChild(div);
            });
        }
    });

    function processAndRecord() {
        const dateVal = document.getElementById('dateSelect').value;
        const gradeVal = document.getElementById('gradeSelect').value;
        const classVal = document.getElementById('classSelect').value;
        const checkboxes = document.querySelectorAll('#studentCheckboxes input[type="checkbox"]:checked');
        const outputArea = document.getElementById('emailOutput');
        const submitBtn = document.getElementById('submitBtn');
        
        if (!dateVal || !gradeVal || !classVal) { alert('請確保日期、年級、班級都有選擇！'); return; }
        if (checkboxes.length === 0) { alert('請至少勾選一位缺課學生！'); return; }

        let emails = [];
        let absentStudents = [];

        checkboxes.forEach(cb => {
            let studentName = cb.value;
            absentStudents.push(studentName);
            let email = dbData.studentEmails[studentName];
            if (email) emails.push(email);
        });

        outputArea.value = emails.join(', ');

        const payload = {
            action: 'addRecord',
            date: dateVal, grade: gradeVal, className: classVal, students: absentStudents.join(', ')
        };

        submitBtn.disabled = true; submitBtn.innerText = "紀錄儲存中...";

        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(response => response.json())
        .then(data => {
            submitBtn.innerText = "✅ 產生成功並已歸檔！";
            loadData(); 
            setTimeout(() => { submitBtn.disabled = false; submitBtn.innerText = "產生授權信箱 並 寫入缺課紀錄"; }, 3000);
        });
    }

    function renderHistoryTable() {
        const tbody = document.getElementById('historyTableBody');
        if(!dbData.historyData || dbData.historyData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#999;">目前尚無紀錄</td></tr>'; return;
        }
        let html = '';
        dbData.historyData.forEach(record => {
            html += `<tr><td>${record.date}</td><td>${record.grade} - ${record.className}</td><td>${record.students}</td></tr>`;
        });
        tbody.innerHTML = html;
    }

    function addNewStudent() {
        const name = document.getElementById('newStudentName').value.trim();
        const email = document.getElementById('newStudentEmail').value.trim();
        const btn = document.getElementById('btnAddStudent');

        if(!name || !email) { alert("請填寫學生姓名與信箱！"); return; }

        const payload = { action: 'addStudent', name: name, email: email };
        btn.disabled = true; btn.innerText = "新增中...";

        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(response => response.json())
        .then(data => {
            alert("✅ 學生已成功新增至總表！");
            document.getElementById('newStudentName').value = '';
            document.getElementById('newStudentEmail').value = '';
            btn.disabled = false; btn.innerText = "確認新增學生";
            loadData(); 
        });
    }

    function assignStudentToClass() {
        // 改為讀取 input 的 value
        const name = document.getElementById('assignStudentInput').value.trim();
        const grade = document.getElementById('assignGradeInput').value.trim();
        const className = document.getElementById('assignClassInput').value.trim();
        const btn = document.getElementById('btnAssignClass');

        if(!name || !grade || !className) { alert("請選擇學生並填寫年級與班級！"); return; }

        const payload = { action: 'assignClass', name: name, grade: grade, className: className };
        btn.disabled = true; btn.innerText = "編班中...";

        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(response => response.json())
        .then(data => {
            alert(`✅ 已成功將 ${name} 編入 ${grade} ${className}！`);
            document.getElementById('assignStudentInput').value = '';
            document.getElementById('assignGradeInput').value = '';
            document.getElementById('assignClassInput').value = '';
            btn.disabled = false; btn.innerText = "確認編入班級";
            loadData(); 
        });
    }

    function copyToClipboard() {
        const copyText = document.getElementById("emailOutput");
        if(!copyText.value) return;
        copyText.select(); copyText.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(copyText.value).then(() => { alert("✅ 信箱已
